arpu, $:
  - domain: "monetization"
  - numerator: revenue
  - denominator: members
  - percentage: false
  - variance: arpu_var
  - sources: ["UG_WEB", "UG_IOS", "UG_ANDROID", "UGT_ANDROID", "UGT_IOS"]
  - platforms: ["all"]
  - description: "average revenue per user"
  - table_position: 1
  - positive: 1
  - prefix: "$"

aov, $:
  - domain: "monetization"
  - numerator: revenue
  - denominator: charge_cnt
  - percentage: false
  - variance: arppu_var
  - sources: ["UG_WEB", "UG_IOS", "UG_ANDROID", "UGT_ANDROID", "UGT_IOS"]
  - platforms: ["all"]
  - description: "average order value"
  - table_position: 2
  - positive: 1
  - prefix: "$"

